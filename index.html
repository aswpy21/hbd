<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <!-- Hero Section -->
        <section class="hero-section">
            <h1 class="fade-in">Happy Birthday, <span class="highlight">Name</span> ✨</h1>
            <p class="subtitle fade-in-delayed">A little digital corner made just for you.</p>
        </section>

        <!-- Memory Card Section -->
        <section class="card fade-in-delayed">
            <div class="image-container">
                <!-- Replace with your friend's picture -->
                <img src="https://via.placeholder.com/400x500" alt="Favorite Memory" class="profile-img">
            </div>
            <div class="text-container">
                <h2>To Someone Special,</h2>
                <!-- The JavaScript will type the letter out right here -->
                <p id="birthday-letter" class="letter-text"></p>
            </div>
        </section>
        
        <!-- Interactive Footer / Note -->
        <footer class="footer fade-in-delayed">
            <p>Made with 🤍</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
